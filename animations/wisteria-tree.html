<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisteria Bonsai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #FDF6EE; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale, treeData = null;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W, H) / 750;
  treeData = null;
}
window.addEventListener('resize', resize);
resize();

// Easing
function easeIO(t) { return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeOut(t) { return 1 - Math.pow(1-t,3); }
function easeOutQuart(t) { return 1 - Math.pow(1-t,4); }
function clamp(v) { return Math.max(0, Math.min(1, v)); }

// Seeded random
let seed;
function srand() { seed=(seed*16807)%2147483647; return (seed-1)/2147483646; }

// Bezier
function cubicB(a,b,c,d,t) { const m=1-t; return m*m*m*a+3*m*m*t*b+3*m*t*t*c+t*t*t*d; }

// Catmull-Rom to cubic Bezier
function catmullToBezier(pts) {
  const segs = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1, 0)];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[Math.min(i+2, pts.length-1)];
    segs.push({
      sx: p1.x, sy: p1.y,
      cp1x: p1.x + (p2.x - p0.x)/6, cp1y: p1.y + (p2.y - p0.y)/6,
      cp2x: p2.x - (p3.x - p1.x)/6, cp2y: p2.y - (p3.y - p1.y)/6,
      ex: p2.x, ey: p2.y
    });
  }
  return segs;
}

// Point on catmull segment list at global t [0,1]
function pointOnSegs(segs, t) {
  if (segs.length === 0) return { x: 0, y: 0 };
  const gt = t * segs.length;
  const si = Math.min(Math.floor(gt), segs.length - 1);
  const lt = gt - si;
  const s = segs[si];
  return {
    x: cubicB(s.sx, s.cp1x, s.cp2x, s.ex, lt),
    y: cubicB(s.sy, s.cp1y, s.cp2y, s.ey, lt)
  };
}

// ===================== TREE GENERATION =====================

function generateTree() {
  seed = 77777;
  const cx = W * 0.48, baseY = H * 0.85;

  // ---- SHORT TRUNK with dramatic S-curve ----
  const trunkH = H * 0.22;
  const trunkPts = [];
  const numTP = 6;
  for (let i = 0; i <= numTP; i++) {
    const t = i / numTP;
    const sway = Math.sin(t * Math.PI * 1.1) * 35 * scale
               + Math.sin(t * Math.PI * 2.5) * 10 * scale;
    trunkPts.push({ x: cx + sway, y: baseY - t * trunkH });
  }
  const trunkSegs = catmullToBezier(trunkPts);
  const trunkWidths = trunkPts.map((_, i) => (20 + 26 * Math.pow(1 - i/numTP, 1.6)) * scale);

  // Helper: make a curvy branch — first point is slightly behind origin
  // along the trunk direction for a smooth overlap
  function makeBranch(origin, angle, len, droop, widthVal, trunkDir) {
    const nWay = 5;
    // Start with a "lead-in" point behind the origin along trunk direction
    // so the catmull-rom spline flows smoothly out of the parent
    const leadIn = trunkDir
      ? { x: origin.x - trunkDir.x * 10 * scale, y: origin.y - trunkDir.y * 10 * scale }
      : null;
    const pts = [];
    if (leadIn) pts.push(leadIn);
    pts.push({ x: origin.x, y: origin.y });
    for (let i = 1; i <= nWay; i++) {
      const t = i / nWay;
      const curveAngle = angle + t * 0.3 * Math.sign(Math.cos(angle));
      const droopY = droop * t * t * len;
      const wobble = Math.sin(t * Math.PI * 2) * 12 * scale;
      pts.push({
        x: origin.x + Math.cos(curveAngle) * len * t + wobble,
        y: origin.y + Math.sin(curveAngle) * len * t + droopY
      });
    }
    return { pts, segs: catmullToBezier(pts), width: widthVal, endPt: pts[pts.length - 1] };
  }

  // Trunk direction at the top (for smooth branch transitions)
  const trunkTopIdx = numTP;
  const trunkPrev = trunkPts[trunkTopIdx - 1];
  const trunkTop = trunkPts[trunkTopIdx];
  const trunkDirRaw = { x: trunkTop.x - trunkPrev.x, y: trunkTop.y - trunkPrev.y };
  const trunkDirLen = Math.sqrt(trunkDirRaw.x**2 + trunkDirRaw.y**2) || 1;
  const trunkDir = { x: trunkDirRaw.x / trunkDirLen, y: trunkDirRaw.y / trunkDirLen };

  // Joint radius — smooth knob where trunk meets branches
  const jointRadius = trunkWidths[trunkTopIdx] * 0.7;

  // ==== LEVEL 1: main branches from upper trunk (staggered origins) ====
  const level1 = [];
  const l1Defs = [
    { a: -Math.PI*0.35, l: 0.28, d: 0.3, w: 0.7, tOff: 0.0 },   // right-up (from top)
    { a: -Math.PI*0.65, l: 0.30, d: 0.25, w: 0.7, tOff: 0.04 },  // left-up (slightly below)
    { a: -Math.PI*0.50, l: 0.18, d: 0.15, w: 0.55, tOff: 0.07 }, // center-up (a bit below)
  ];
  for (const def of l1Defs) {
    const angle = def.a + (srand()-0.5) * 0.15;
    const len = (H * def.l + srand() * 30) * scale;
    const w = (7 + srand() * 3) * def.w * scale;
    // Origin offset: each branch starts at a slightly different point along the top of the trunk
    const originT = 1.0 - def.tOff;
    const originIdx = Math.floor(originT * (trunkPts.length - 1));
    const branchOrigin = trunkPts[Math.max(originIdx, trunkPts.length - 3)];
    level1.push(makeBranch(branchOrigin, angle, len, def.d, w, trunkDir));
  }

  // ==== LEVEL 2: secondary branches from ends/mid of level 1 ====
  const level2 = [];
  for (const b1 of level1) {
    const nSplit = 2 + Math.floor(srand() * 3);
    for (let j = 0; j < nSplit; j++) {
      const t = 0.4 + (j / nSplit) * 0.55;
      const origin = pointOnSegs(b1.segs, t);
      const ahead = pointOnSegs(b1.segs, Math.min(t + 0.06, 1));
      const parentAngle = Math.atan2(ahead.y - origin.y, ahead.x - origin.x);
      const pdx = ahead.x - origin.x, pdy = ahead.y - origin.y;
      const pdl = Math.sqrt(pdx*pdx + pdy*pdy) || 1;
      const parentDir = { x: pdx/pdl, y: pdy/pdl };
      const spread = (srand() - 0.5) * 1.6;
      const angle = parentAngle + spread;
      const len = (80 + srand() * 80) * scale;
      const droop = 0.35 + srand() * 0.45;
      const w = b1.width * (0.45 + srand() * 0.2);
      level2.push(makeBranch(origin, angle, len, droop, w, parentDir));
    }
  }

  // ==== TWIGS off level 2 ====
  const twigs = [];
  for (const b2 of level2) {
    const nTwig = 3 + Math.floor(srand() * 4);
    for (let j = 0; j < nTwig; j++) {
      const t = 0.2 + (j / nTwig) * 0.75;
      const origin = pointOnSegs(b2.segs, t);
      const ahead = pointOnSegs(b2.segs, Math.min(t + 0.08, 1));
      const pAngle = Math.atan2(ahead.y - origin.y, ahead.x - origin.x);
      const pdx2 = ahead.x - origin.x, pdy2 = ahead.y - origin.y;
      const pdl2 = Math.sqrt(pdx2*pdx2 + pdy2*pdy2) || 1;
      const pDir2 = { x: pdx2/pdl2, y: pdy2/pdl2 };
      const angle = pAngle + (srand() - 0.4) * 1.5;
      const len = (25 + srand() * 45) * scale;
      const w = b2.width * (0.35 + srand() * 0.15);
      twigs.push(makeBranch(origin, angle, len, 0.5 + srand() * 0.4, w, pDir2));
    }
  }

  // Collect all branches with level tags for draw ordering
  const allBranches = [];
  for (const b of level1) allBranches.push({ ...b, level: 1 });
  for (const b of level2) allBranches.push({ ...b, level: 2 });
  for (const b of twigs)  allBranches.push({ ...b, level: 3 });

  // ---- LEAVES: mostly on level 2 and twigs ----
  const leaves = [];
  function addLeaves(segs, count) {
    for (let i = 0; i < count; i++) {
      const t = 0.08 + srand() * 0.88;
      const pt = pointOnSegs(segs, t);
      const sz = (4 + srand() * 6) * scale;
      const ang = srand() * Math.PI * 2;
      const green = srand();
      const r = Math.floor(85 + green * 45);
      const g = Math.floor(135 + green * 55);
      const bl = Math.floor(55 + green * 45);
      leaves.push({
        x: pt.x + (srand()-0.5) * 16 * scale,
        y: pt.y + (srand()-0.5) * 12 * scale,
        size: sz, angle: ang,
        color: `rgb(${r},${g},${bl})`,
        delay: srand() * 0.4
      });
    }
  }
  for (const b of level1) addLeaves(b.segs, 6 + Math.floor(srand()*4));
  for (const b of level2) addLeaves(b.segs, 10 + Math.floor(srand()*8));
  for (const b of twigs)  addLeaves(b.segs, 5 + Math.floor(srand()*5));

  // ---- FLOWER CASCADES: hang from level 2 and twigs ----
  const cascades = [];
  function addCascades(segs, count) {
    for (let i = 0; i < count; i++) {
      const t = 0.2 + srand() * 0.75;
      const pt = pointOnSegs(segs, t);
      cascades.push(makeCascade(pt.x, pt.y));
    }
  }
  function makeCascade(x, y) {
    const len = (40 + srand() * 65) * scale;
    const n = 12 + Math.floor(srand() * 12);
    const phase = srand() * Math.PI * 2;
    const swayAmp = 0.8 + srand() * 1.8;
    const curve = (srand() - 0.5) * 10 * scale;
    const flowers = [];
    for (let i = 0; i < n; i++) {
      const t = i / n;
      const spread = (1 - t * 0.65) * 6;
      const fx = (srand() - 0.5) * spread * scale + curve * t * t;
      const fy = t * len;
      const sz = (1.2 + (1-t) * 2.2 + srand() * 1.0) * scale;
      const hue = 258 + srand() * 35 - 15;
      const sat = 28 + srand() * 28;
      const lit = 66 + srand() * 20;
      flowers.push({ ox: fx, oy: fy, size: sz, hue, sat, lit });
    }
    return { x, y, len, flowers, phase, swayAmp };
  }
  for (const b of level2) addCascades(b.segs, 3 + Math.floor(srand()*3));
  for (const b of twigs)  addCascades(b.segs, 1 + Math.floor(srand()*2));

  treeData = { trunkPts, trunkSegs, trunkWidths, jointRadius, level1, allBranches, leaves, cascades };
}

// ===================== DRAWING =====================
const DUR = 16000;
const T_TRUNK  = [0, 2500];
const T_LVL1   = [1800, 4800];   // level 1 branches
const T_LVL2   = [3500, 7000];   // level 2 branches
const T_TWIG   = [5000, 8000];   // twigs
const T_LEAF   = [5500, 9500];
const T_FLOWER = [7500, 12500];
const T_HOLD   = 14000;
const T_FADE   = 16000;

let t0 = null, prevW = 0, prevH = 0;

function draw(ts) {
  if (!t0) t0 = ts;
  if (W !== prevW || H !== prevH) { prevW = W; prevH = H; treeData = null; }
  if (!treeData) generateTree();

  const elapsed = (ts - t0) % DUR;
  let alpha = 1;
  if (elapsed > T_HOLD) alpha = 1 - easeIO((elapsed - T_HOLD) / (T_FADE - T_HOLD));

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#FDF8F0');
  bg.addColorStop(1, '#F8F0E4');
  ctx.globalAlpha = 1;
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = alpha;

  const { trunkSegs, trunkPts, trunkWidths, jointRadius, allBranches, leaves, cascades } = treeData;

  // ---- TRUNK ----
  const trunkP = easeIO(clamp((elapsed - T_TRUNK[0]) / (T_TRUNK[1] - T_TRUNK[0])));
  if (trunkP > 0) drawTrunk(trunkSegs, trunkPts, trunkWidths, jointRadius, trunkP, alpha);

  // ---- BRANCHES by level ----
  const timings = { 1: T_LVL1, 2: T_LVL2, 3: T_TWIG };
  for (let lvl = 1; lvl <= 3; lvl++) {
    const T = timings[lvl];
    const p = easeOut(clamp((elapsed - T[0]) / (T[1] - T[0])));
    if (p <= 0) continue;
    const levelBranches = allBranches.filter(b => b.level === lvl);
    for (let bi = 0; bi < levelBranches.length; bi++) {
      const b = levelBranches[bi];
      const stagger = bi / levelBranches.length * 0.35;
      const lp = clamp((p - stagger) / (1 - stagger));
      if (lp > 0) drawBranchSegs(b.segs, b.width, lp);
    }
  }

  // ---- LEAVES ----
  const leafP = easeOut(clamp((elapsed - T_LEAF[0]) / (T_LEAF[1] - T_LEAF[0])));
  if (leafP > 0) drawLeaves(leaves, leafP, alpha);

  // ---- FLOWER CASCADES ----
  const flowerP = easeOutQuart(clamp((elapsed - T_FLOWER[0]) / (T_FLOWER[1] - T_FLOWER[0])));
  if (flowerP > 0) drawCascades(cascades, flowerP, elapsed / 1000, alpha);

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

// ---- Draw trunk ----
function drawTrunk(segs, pts, widths, jointR, progress, alpha) {
  const total = segs.length;
  const visible = progress * total;

  for (let i = 0; i < Math.min(Math.ceil(visible), total); i++) {
    const seg = segs[i];
    const segP = clamp(visible - i);
    const steps = 10;
    const maxStep = Math.ceil(segP * steps);

    for (let s = 0; s < maxStep; s++) {
      const t0v = s / steps;
      const t1v = Math.min((s+1)/steps, segP);
      const gt = (i + t0v) / total;

      const x0 = cubicB(seg.sx, seg.cp1x, seg.cp2x, seg.ex, t0v);
      const y0 = cubicB(seg.sy, seg.cp1y, seg.cp2y, seg.ey, t0v);
      const x1 = cubicB(seg.sx, seg.cp1x, seg.cp2x, seg.ex, t1v);
      const y1 = cubicB(seg.sy, seg.cp1y, seg.cp2y, seg.ey, t1v);

      const wi = i + t0v;
      const w0i = Math.floor(wi);
      const w1i = Math.min(w0i + 1, widths.length - 1);
      const wt = wi - w0i;
      const w = widths[w0i] * (1 - wt) + widths[w1i] * wt;

      const shade = 0.6 + gt * 0.4;
      const r = Math.floor(100 * shade + 35);
      const g = Math.floor(82 * shade + 28);
      const b = Math.floor(58 * shade + 22);

      ctx.lineCap = 'round';
      ctx.strokeStyle = `rgb(${r},${g},${b})`;
      ctx.lineWidth = w;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }
  }

  // Bark texture
  if (progress > 0.15) {
    ctx.globalAlpha = alpha * 0.15;
    const barkVis = Math.floor(progress * total);
    for (let k = 0; k < 8; k++) {
      const offR = (k - 3.5) / 4 * 0.6;
      ctx.strokeStyle = '#4A3820';
      ctx.lineWidth = 0.8 * scale;
      ctx.beginPath();
      let started = false;
      for (let i = 0; i <= barkVis && i < total; i++) {
        const seg = segs[i];
        for (let s = 0; s <= 5; s++) {
          const t = s / 5;
          const gi = (i + t) / total;
          const x = cubicB(seg.sx, seg.cp1x, seg.cp2x, seg.ex, t);
          const y = cubicB(seg.sy, seg.cp1y, seg.cp2y, seg.ey, t);
          const wi2 = Math.min(Math.floor(i + t), widths.length - 1);
          const localW = widths[wi2];
          const twist = Math.sin(gi * 8 + k * 1.7) * localW * offR;
          if (!started) { ctx.moveTo(x + twist, y); started = true; }
          else ctx.lineTo(x + twist, y);
        }
      }
      ctx.stroke();
    }
    ctx.globalAlpha = alpha;
  }

  // Smooth joint knob at the top of the trunk where branches emerge
  if (progress > 0.85) {
    const top = pts[pts.length - 1];
    const jAlpha = clamp((progress - 0.85) / 0.15);
    const jR = jointR * jAlpha;
    // Layered soft circle for organic knob
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = '#8B7355';
    ctx.beginPath();
    ctx.arc(top.x, top.y, jR * 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#9A8265';
    ctx.beginPath();
    ctx.arc(top.x, top.y - jR * 0.15, jR * 0.85, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha;
  }

  // Ground mound
  if (progress > 0.05) {
    const base = pts[0];
    const moundW = widths[0] * 2.2;
    ctx.fillStyle = '#8B7B65';
    ctx.beginPath();
    ctx.ellipse(base.x, base.y + 4 * scale, moundW, 10 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha * 0.08;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(base.x + 5 * scale, base.y + 8 * scale, moundW * 1.3, 6 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha;
  }
}

// ---- Draw branch segments ----
function drawBranchSegs(segs, baseWidth, progress) {
  const total = segs.length;
  const visible = progress * total;

  for (let i = 0; i < Math.min(Math.ceil(visible), total); i++) {
    const seg = segs[i];
    const segP = clamp(visible - i);
    const steps = 8;
    const maxStep = Math.ceil(segP * steps);

    for (let s = 0; s < maxStep; s++) {
      const t0v = s / steps, t1v = Math.min((s+1)/steps, segP);
      const gt = (i + t0v) / total;
      const x0 = cubicB(seg.sx, seg.cp1x, seg.cp2x, seg.ex, t0v);
      const y0 = cubicB(seg.sy, seg.cp1y, seg.cp2y, seg.ey, t0v);
      const x1 = cubicB(seg.sx, seg.cp1x, seg.cp2x, seg.ex, t1v);
      const y1 = cubicB(seg.sy, seg.cp1y, seg.cp2y, seg.ey, t1v);
      const w = baseWidth * (1 - gt * 0.7);

      const shade = 0.7 + gt * 0.3;
      const r = Math.floor(115 * shade + 28);
      const g = Math.floor(96 * shade + 22);
      const b = Math.floor(70 * shade + 18);

      ctx.lineCap = 'round';
      ctx.strokeStyle = `rgb(${r},${g},${b})`;
      ctx.lineWidth = w;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }
  }
}

// ---- Draw leaves ----
function drawLeaves(lvs, progress, baseAlpha) {
  for (let i = 0; i < lvs.length; i++) {
    const l = lvs[i];
    const lt = clamp((progress - l.delay) / 0.6);
    if (lt <= 0) continue;
    const sz = l.size * easeOut(lt);
    const a = baseAlpha * (0.6 + lt * 0.4);

    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.angle);
    ctx.globalAlpha = a;

    ctx.fillStyle = l.color;
    ctx.beginPath();
    ctx.moveTo(0, -sz * 0.65);
    ctx.bezierCurveTo(sz*0.55, -sz*0.35, sz*0.55, sz*0.35, 0, sz*0.65);
    ctx.bezierCurveTo(-sz*0.55, sz*0.35, -sz*0.55, -sz*0.35, 0, -sz*0.65);
    ctx.fill();

    ctx.globalAlpha = a * 0.3;
    ctx.strokeStyle = '#3A5528';
    ctx.lineWidth = 0.5 * scale;
    ctx.beginPath();
    ctx.moveTo(0, -sz * 0.45);
    ctx.lineTo(0, sz * 0.45);
    ctx.stroke();

    ctx.restore();
  }
}

// ---- Draw flower cascades ----
function drawCascades(cascades, progress, time, baseAlpha) {
  const sorted = cascades.slice().sort((a, b) => a.y - b.y);

  for (const c of sorted) {
    const cascadeP = easeOutQuart(progress);
    const swayStr = progress > 0.8 ? 1 : progress / 0.8;
    const sway = Math.sin(time * 0.8 + c.phase) * c.swayAmp * swayStr;
    const sway2 = Math.sin(time * 1.3 + c.phase + 1) * c.swayAmp * 0.3 * swayStr;

    for (let i = 0; i < c.flowers.length; i++) {
      const f = c.flowers[i];
      const depthT = f.oy / c.len;
      const flT = clamp((cascadeP - depthT * 0.5) / 0.5);
      if (flT <= 0) continue;

      const visY = f.oy * flT;
      const swX = (sway + sway2 * depthT) * depthT * 5;
      const fx = c.x + f.ox + swX;
      const fy = c.y + visY;
      const sz = f.size * easeOut(flT);

      ctx.globalAlpha = baseAlpha * (0.5 + flT * 0.5);

      const hsl = `hsl(${f.hue}, ${f.sat}%, ${f.lit}%)`;
      const hslLight = `hsl(${f.hue}, ${f.sat - 10}%, ${f.lit + 14}%)`;
      ctx.fillStyle = hsl;

      // Small 4-petal flower
      for (let p = 0; p < 4; p++) {
        const pa = (p / 4) * Math.PI * 2 + depthT * 0.5;
        const px = fx + Math.cos(pa) * sz * 0.22;
        const py = fy + Math.sin(pa) * sz * 0.22;
        ctx.beginPath();
        ctx.ellipse(px, py, sz * 0.3, sz * 0.45, pa, 0, Math.PI * 2);
        ctx.fill();
      }

      // Bright center
      ctx.fillStyle = hslLight;
      ctx.globalAlpha = baseAlpha * flT * 0.55;
      ctx.beginPath();
      ctx.arc(fx, fy, sz * 0.14, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = baseAlpha;
}

// Start
requestAnimationFrame(draw);
</script>
</body>
</html>
